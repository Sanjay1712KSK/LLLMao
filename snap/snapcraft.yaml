name: lllmao

base: core24

version: 'v1Janus-Beta'

summary: Local AI Workstation Platform

description: |
  LLLMao is a Linux-native local AI workstation platform powered by Ollama.
  It provides multimodal chat, workspace-aware retrieval,
  local voice interaction, telemetry, and offline-first AI workflows.

grade: devel

confinement: classic

apps:
  lllmao:
    command: scripts/start-lllmao.sh

    desktop: assets/lllmao.desktop

    environment:
      PYTHONUNBUFFERED: "1"

    plugs:
      - network
      - network-bind
      - home
      - removable-media
      - audio-playback
      - audio-record
      - opengl
      - desktop
      - desktop-legacy
      - wayland
      - x11

parts:

  scripts:
    plugin: dump

    source: deployment/scripts

    organize:
      start-lllmao.sh: scripts/start-lllmao.sh

  assets:
    plugin: dump

    source: deployment/assets

    organize:
      lllmao.desktop: assets/lllmao.desktop

  backend:
    plugin: nil

    source: backend

    build-packages:
      - build-essential
      - python3
      - python3-dev
      - python3-venv
      - python3-pip

    stage-packages:
      - python3
      - python3-venv
      - ffmpeg
      - libasound2t64

    override-build: |
      mkdir -p $CRAFT_PART_INSTALL/backend

      cp -r . $CRAFT_PART_INSTALL/backend/

      cd $CRAFT_PART_INSTALL/backend

      python3 -m venv venv

      ./venv/bin/pip install --upgrade pip

      ./venv/bin/pip install -r requirements.txt

      ./venv/bin/pip install uvicorn[standard]

  frontend:
    plugin: nil

    source: .

    build-packages:
      - curl
      - wget
      - build-essential
      - nodejs
      - npm
      - cargo
      - rustc
      - libssl-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - libwebkit2gtk-4.1-dev

    override-build: |
      corepack enable

      corepack prepare pnpm@latest --activate

      export PATH="$HOME/.cargo/bin:$PATH"

      cd frontend

      pnpm install

      pnpm tauri build

      mkdir -p $CRAFT_PART_INSTALL/frontend

      if [ -f src-tauri/target/release/app ]; then
        cp src-tauri/target/release/app $CRAFT_PART_INSTALL/frontend/lllmao
      else
        echo "ERROR: Tauri binary not found"
        ls src-tauri/target/release
        exit 1
      fi
