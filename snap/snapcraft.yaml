name: lllmao
base: core24
version: '0.1.0'
summary: Local Lightweight Language Model Assistant Orchestrator
description: |
  LLLMao is a Linux-native local AI workstation for already-installed Ollama
  models, semantic RAG, workspace intelligence, and multimodal workflows.

grade: stable
confinement: classic

apps:
  lllmao:
    command: bin/lllmao
    plugs:
      - home
      - network
      - network-bind
      - removable-media

parts:
  lllmao:
    plugin: dump
    source: .
