name: lllmao
base: core24
version: 'v1Janus-Beta'
summary: Local AI Workstation Platform
description: |
  LLLMao is a local-first, offline-first Linux-native AI workstation.
  Chat with local Ollama models, perform workspace contextual retrieval,
  and analyze images using multimodal vision models.

grade: devel
confinement: classic

apps:
  lllmao:
    command: scripts/start-lllmao.sh
    desktop: assets/lllmao.desktop
    environment:
      PYTHONUNBUFFERED: "1"
    plugs:
      - network
      - network-bind
      - home
      - removable-media
      - audio-playback
      - audio-record
      - opengl
      - desktop
      - desktop-legacy
      - wayland
      - x11

parts:
  scripts:
    plugin: dump
    source: deployment/scripts
    organize:
      start-lllmao.sh: scripts/start-lllmao.sh

  assets:
    plugin: dump
    source: deployment/assets
    organize:
      lllmao.desktop: assets/lllmao.desktop

  backend:
    plugin: python
    source: backend
    python-packages:
      - "uvicorn[standard]"
    build-packages:
      - build-essential
      - python3-dev
    stage-packages:
      - libasound2t64
      - ffmpeg

  frontend:
    plugin: npm
    source: frontend
    npm-include-node: true
    npm-node-version: "20.10.0"
    build-packages:
      - curl
      - wget
      - libwebkit2gtk-4.1-dev
      - build-essential
      - libssl-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
    override-build: |
      # Install Rust
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      export PATH="$HOME/.cargo/bin:$PATH"
      
      # Build Tauri
      npm ci
      npm run build
      npx tauri build --bundles deb
      
      # Copy the binary to the snap part
      mkdir -p $CRAFT_PART_INSTALL/frontend
      cp src-tauri/target/release/LLLMao $CRAFT_PART_INSTALL/frontend/
